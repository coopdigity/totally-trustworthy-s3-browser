name: Build & Release

# Builds Windows, Linux and macOS artifacts on every version tag (e.g. v1.2.3),
# publishes them to a GitHub Release, and pushes the Linux .snap to the Snap Store.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed for electron-builder to create the GitHub Release

jobs:
  release:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # snapcraft uploads the built .snap; squashfs-tools lets electron-builder
      # pack the .snap image.
      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          sudo snap install snapcraft --classic

      # Build the host OS's targets only (no publish). electron-builder
      # unconditionally routes snaps to the Snap Store on --publish, so we
      # build with --publish never and upload artifacts ourselves below.
      # macOS is built UNSIGNED (no Apple cert) — users will see a Gatekeeper warning.
      - name: Build
        run: npm run dist
        env:
          # Skip code signing on macOS — we ship unsigned for now.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Upload all installers/packages to the GitHub Release for this tag.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.blockmap

      # Push the .snap to the Snap Store stable channel.
      # SNAPCRAFT_STORE_CREDENTIALS = output of `snapcraft export-login -`.
      # continue-on-error until the personal-files store review is approved —
      # the store rejects uploads until then. FLIP TO false once approved so
      # store-push failures fail the build loudly.
      - name: Publish to Snap Store
        if: matrix.platform == 'linux'
        continue-on-error: true
        run: snapcraft upload --release=stable release/*.snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
